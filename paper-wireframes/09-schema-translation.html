<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema Translation - Multiple Modalities</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .container {
            width: 1200px;
            height: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 24px 32px;
            border-bottom: 2px solid #e2e8f0;
        }
        .header h1 {
            font-size: 24px;
            color: #1a202c;
            margin-bottom: 4px;
        }
        .header p {
            font-size: 14px;
            color: #718096;
        }
        .tabs {
            display: flex;
            gap: 0;
            background: #f7fafc;
            border-bottom: 2px solid #e2e8f0;
            padding: 0 32px;
        }
        .tab {
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 500;
            color: #718096;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .tab:hover {
            color: #4a5568;
            background: rgba(255, 255, 255, 0.5);
        }
        .tab.active {
            color: #4c51bf;
            border-bottom-color: #4c51bf;
            background: white;
        }
        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }
        .form-preview {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 32px;
            max-width: 700px;
        }
        .form-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 24px;
        }
        .form-row {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: white;
        }
        .form-row-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }
        .form-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }
        .btn-primary {
            background: #4c51bf;
            color: white;
        }
        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
        }
        .modality-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 8px;
            background: #e6fffa;
            color: #234e52;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Equipment Rental Portfolio</h1>
            <p>Same schema, multiple output formats</p>
        </div>

        <div class="tabs">
            <div class="tab active">📋 Form</div>
            <div class="tab">🔌 API</div>
            <div class="tab">💾 Database</div>
            <div class="tab">📊 Report</div>
        </div>

        <div class="content">
            <div class="form-preview">
                <div class="form-title">Equipment Rental Request</div>
                
                <div class="form-row">
                    <label class="form-label">Equipment Type</label>
                    <select class="form-select">
                        <option>Select equipment type...</option>
                        <option>Cardio Machine</option>
                        <option>Strength Equipment</option>
                        <option>Free Weights</option>
                        <option>Accessories</option>
                    </select>
                </div>

                <div class="form-row-group">
                    <div class="form-row">
                        <label class="form-label">Rental Start Date</label>
                        <input type="date" class="form-input" />
                    </div>
                    <div class="form-row">
                        <label class="form-label">Rental Period</label>
                        <select class="form-select">
                            <option>Select duration...</option>
                            <option>1 month</option>
                            <option>3 months</option>
                            <option>6 months</option>
                            <option>12 months</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <label class="form-label">Quantity</label>
                    <input type="number" class="form-input" placeholder="Number of units" />
                </div>

                <div class="form-row">
                    <label class="form-label">Special Requirements</label>
                    <input type="text" class="form-input" placeholder="Delivery, installation, training, etc." />
                </div>

                <div class="form-row">
                    <label class="form-label">Budget Range (per month)</label>
                    <select class="form-select">
                        <option>Select budget range...</option>
                        <option>Under $500</option>
                        <option>$500 - $1,000</option>
                        <option>$1,000 - $2,500</option>
                        <option>$2,500+</option>
                    </select>
                </div>

                <div class="form-footer">
                    <button class="btn btn-primary">Submit Request</button>
                    <button class="btn btn-secondary">Save Draft</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
